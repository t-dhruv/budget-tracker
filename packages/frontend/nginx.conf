    # CSP for the static Astro landing pages (/, /privacy-policy, /terms-of-use).
    # Astro emits a few small inline <script> blocks to bootstrap astro-island
    # hydration; without 'unsafe-inline' those are blocked and Vue islands never
    # wire up their click handlers. All other directives match $csp_policy.
    # Same envsubst rules as $csp_policy — see comment above.
    set $csp_policy_landing "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.i.posthog.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' ${CSP_EXTRA_ANALYTICS} https://api.iconify.design https://api.simplesvg.com https://api.unisvg.com; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'";

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy $csp_policy always;

    # Import endpoints receive uploaded files base64-encoded inside a JSON body.
    # The backend caps each file at 10 MB, which is ~13.3 MB once base64-encoded;
    # 15m leaves headroom above that. Set at server scope so it is inherited by
    # the entrypoint-generated `location /api/` proxy include below (nginx's
    # default is 1 MB, which would 413 any import larger than ~750 KB).
    client_max_body_size 15m;

    # Entrypoint-generated optional /api reverse proxy. The container
    # entrypoint writes /etc/nginx/includes/api-proxy.conf: a `location /api/`
    # block proxying to BACKEND_URL when that env var is set (same-origin
    # mode), or an empty file otherwise so nginx starts without it.
    include /etc/nginx/includes/*.conf;

    # PostHog reverse proxy (bypasses ad blockers)
    # ^~ ensures these take priority over regex locations (like \.js$)
    # /helper/static/ must come first — PostHog SDK loads scripts from this path,
    # and they live on the assets CDN, not the API server.
    location ^~ /helper/static/ {
      proxy_pass https://eu-assets.i.posthog.com/static/;
      proxy_set_header Host eu-assets.i.posthog.com;
      proxy_ssl_server_name on;
      proxy_ssl_name eu-assets.i.posthog.com;
    }

    location ^~ /helper/ {
      proxy_pass https://eu.i.posthog.com/;
      proxy_set_header Host eu.i.posthog.com;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_ssl_server_name on;
      proxy_ssl_name eu.i.posthog.com;
    }

    # API reverse proxy — forwards /api/ calls to the backend.
    # The backend has zero external exposure; all API requests go through
    # the frontend nginx from the same origin. Cloudflare Tunnel only
    # publishes the frontend.
    location /api/ {
        proxy_pass http://backend:24681;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;
    }

    # --- Astro landing pages ---

    # Serve Astro landing for exact "/" route
    location = / {
      root   /landing;
      # Content negotiation: $landing_index_file resolves to /index.html
      # by default, or /index.md when Accept: text/markdown is sent.
      try_files $landing_index_file =404;

      # Re-declare server-level security headers (nginx does not inherit
      # add_header once any add_header is set at this level).
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
      add_header Content-Security-Policy $csp_policy_landing always;

      # Agent discovery (RFC 8288) — expose well-known resources via Link headers
      add_header Link '</.well-known/api-catalog>; rel="api-catalog"; type="application/linkset+json"' always;
      add_header Link '</.well-known/mcp/server-card.json>; rel="service-desc"; type="application/json"' always;
      add_header Link '</terms-of-use>; rel="terms-of-service"' always;
      add_header Link '</privacy-policy>; rel="privacy-policy"' always;

      # Caches must key on Accept header because we content-negotiate HTML/Markdown
      add_header Vary "Accept" always;
    }

    # Serve Astro legal pages
    location = /privacy-policy {
      root   /landing;
      try_files $landing_privacy_file =404;

      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
      add_header Content-Security-Policy $csp_policy_landing always;

      add_header Link '</.well-known/api-catalog>; rel="api-catalog"; type="application/linkset+json"' always;
      add_header Link '</terms-of-use>; rel="terms-of-service"' always;

      add_header Vary "Accept" always;
    }
    location = /terms-of-use {
      root   /landing;
      try_files $landing_terms_file =404;

      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
      add_header Content-Security-Policy $csp_policy_landing always;

      add_header Link '</.well-known/api-catalog>; rel="api-catalog"; type="application/linkset+json"' always;
      add_header Link '</privacy-policy>; rel="privacy-policy"' always;

      add_header Vary "Accept" always;
    }

    # --- Agent discovery well-known paths ---

    # RFC 9727: /.well-known/api-catalog must return application/linkset+json.
    # File has no extension, so default_type is required.
    location = /.well-known/api-catalog {
      root /app;
      default_type "application/linkset+json";
      add_header Access-Control-Allow-Origin "*" always;
      add_header Cache-Control "public, max-age=3600" always;
      add_header X-Content-Type-Options "nosniff" always;
    }

    # RFC 8414: OAuth Authorization Server Metadata.
    # Mirrors the backend's /.well-known/oauth-authorization-server — the
    # issuer field points to the actual AS (mcp.moneymatter.app). Keep in sync
    # with packages/backend/src/routes/oauth-metadata.route.ts.
    # Both root and path-aware (RFC 8414 §3.1) forms serve the same document.
    location = /.well-known/oauth-authorization-server {
      root /app;
      default_type "application/json";
      add_header Access-Control-Allow-Origin "*" always;
      add_header Cache-Control "public, max-age=3600" always;
      add_header X-Content-Type-Options "nosniff" always;
    }
    location = /.well-known/oauth-authorization-server/mcp {
      root /app;
      try_files /.well-known/oauth-authorization-server =404;
      default_type "application/json";
      add_header Access-Control-Allow-Origin "*" always;
      add_header Cache-Control "public, max-age=3600" always;
      add_header X-Content-Type-Options "nosniff" always;
    }

    # RFC 9728: OAuth Protected Resource Metadata.
    # Mirrors the backend's /.well-known/oauth-protected-resource. Keep in sync
    # with packages/backend/src/routes/oauth-metadata.route.ts.
    # Both root and path-aware (RFC 9728 §3.1) forms serve the same document.
    location = /.well-known/oauth-protected-resource {
      root /app;
      default_type "application/json";
      add_header Access-Control-Allow-Origin "*" always;
      add_header Cache-Control "public, max-age=3600" always;
      add_header X-Content-Type-Options "nosniff" always;
    }
    location = /.well-known/oauth-protected-resource/mcp {
      root /app;
      try_files /.well-known/oauth-protected-resource =404;
      default_type "application/json";
      add_header Access-Control-Allow-Origin "*" always;
      add_header Cache-Control "public, max-age=3600" always;
      add_header X-Content-Type-Options "nosniff" always;
    }

    # MCP Server Card (SEP-1649 draft). Content-Type is inferred from the
    # .json extension via mime.types — this location just adds CORS + cache.
    location = /.well-known/mcp/server-card.json {
      root /app;
      add_header Access-Control-Allow-Origin "*" always;
      add_header Cache-Control "public, max-age=3600" always;
      add_header X-Content-Type-Options "nosniff" always;
    }

    # RFC 9116 — security disclosure contact. Without an explicit location the
    # SPA fallback would return index.html. Both URIs (well-known + legacy root)
    # are kept so older scanners still find it.
    location = /.well-known/security.txt {
      root /app;
      default_type "text/plain";
      add_header Cache-Control "public, max-age=3600" always;
      add_header X-Content-Type-Options "nosniff" always;
    }
    location = /security.txt {
      root /app;
      try_files /.well-known/security.txt =404;
      default_type "text/plain";
      add_header Cache-Control "public, max-age=3600" always;
      add_header X-Content-Type-Options "nosniff" always;
    }

    # Agent Skills Discovery RFC v0.2.0 — catalog of SKILL.md docs for agents.
    location = /.well-known/agent-skills/index.json {
      root /app;
      add_header Access-Control-Allow-Origin "*" always;
      add_header Cache-Control "public, max-age=3600" always;
      add_header X-Content-Type-Options "nosniff" always;
    }

    # Skill docs referenced from the agent-skills index. Content-Type is set
    # to text/markdown via the http-level types{} block (see #2). Agents
    # verify the file against the sha256 in the index, so CORS is required.
    location ^~ /skills/ {
      root /app;
      add_header Access-Control-Allow-Origin "*" always;
      add_header Cache-Control "public, max-age=3600" always;
      add_header X-Content-Type-Options "nosniff" always;
    }

    # Serve Astro static assets (hashed, immutable)
    # ^~ ensures this takes priority over regex locations like \.css$
    location ^~ /_astro/ {
      root   /landing;
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
    }

    # Sitemap — generated by @astrojs/sitemap from packages/landing's known
    # routes. Index file + paginated children. Crawlers fetch the index first.
    # Old /sitemap.xml URL is redirected for any historical bookmarks.
    location = /sitemap-index.xml {
      root /landing;
      add_header Cache-Control "public, max-age=3600" always;
      add_header X-Content-Type-Options "nosniff" always;
    }
    location ~ ^/sitemap-\d+\.xml$ {
      root /landing;
      add_header Cache-Control "public, max-age=3600" always;
      add_header X-Content-Type-Options "nosniff" always;
    }
    location = /sitemap.xml {
      return 301 /sitemap-index.xml;
    }

    # Images: try landing first, then frontend
    # ^~ ensures this takes priority over regex image location
    location ^~ /img/ {
      root   /landing;
      try_files $uri @frontend_img;
    }
    location @frontend_img {
      root   /app;
      try_files $uri =404;
      expires 7d;
      add_header Cache-Control "public, max-age=604800";
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
    }

    # --- SPA static assets ---

    # Cache static assets with hashed filenames (immutable, 1 year)
    location ~* \.(?:js|css)$ {
      root   /app;
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
    }

    # Cache fonts (1 year)
    location ~* \.(?:woff2?|ttf|otf|eot)$ {
      root   /app;
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
    }

    # Cache images (1 week, they may be updated)
    location ~* \.(?:png|jpg|jpeg|gif|webp|svg|ico)$ {
      root   /app;
      expires 7d;
      add_header Cache-Control "public, max-age=604800";
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
    }

    # Deploy probe. Must never be cached — the running app polls this every
    # 60s to compare against its build-time hash and prompt a reload when the
    # server has a newer build.
    location = /version.json {
      root /app;
      add_header Cache-Control "no-store" always;
      add_header X-Content-Type-Options "nosniff" always;
    }

    # Runtime config shim. The container entrypoint rewrites /app/config.js per
    # container, so it must never be cached — an exact-match location outranks
    # the immutable `\.js$` rule that would otherwise pin it for a year.
    location = /config.js {
      root /app;
      add_header Cache-Control "no-store" always;
      add_header X-Content-Type-Options "nosniff" always;
    }

    # All other routes: SPA fallback.
    # Cache-Control no-store applies to index.html (returned by try_files when
    # the request matches no static file). The browser must always re-fetch
    # the entrypoint so a fresh deploy's hashed asset references aren't served
    # from cache.
    location / {
      root   /app;
      index  index.html;
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-store" always;
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
      add_header Content-Security-Policy $csp_policy always;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
      root   /usr/share/nginx/html;
    }
  }
}
