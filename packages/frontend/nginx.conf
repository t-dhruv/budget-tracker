worker_processes  1;
error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;

events {
  worker_connections  1024;
}

http {
  # Temp paths for non-root user
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path       /tmp/proxy_temp;
  fastcgi_temp_path     /tmp/fastcgi_temp;
  uwsgi_temp_path       /tmp/uwsgi_temp;
  scgi_temp_path        /tmp/scgi_temp;

  include       /etc/nginx/mime.types;
  # Register markdown extension for agent content negotiation.
  # Multiple types{} blocks at the same level merge in nginx.
  types {
    text/markdown md;
  }
  default_type  application/octet-stream;

  # Markdown-for-Agents content negotiation: serve .md variant when
  # Accept: text/markdown is present; fall back to HTML otherwise.
  map $http_accept $landing_index_file {
    default           /index.html;
    "~*text/markdown" /index.md;
  }
  map $http_accept $landing_privacy_file {
    default           /privacy-policy/index.html;
    "~*text/markdown" /privacy-policy.md;
  }
  map $http_accept $landing_terms_file {
    default           /terms-of-use/index.html;
    "~*text/markdown" /terms-of-use.md;
  }

  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
  access_log  /var/log/nginx/access.log  main;

  sendfile        on;
  keepalive_timeout  65;

  # Hide nginx version
  server_tokens off;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml text/javascript
             application/javascript application/json application/xml
             application/xml+rss image/svg+xml;

  server {
    listen       24680;
    server_name  _;

    # Content-Security-Policy for the SPA.
    #   script-src:   'unsafe-eval' for PostHog Function constructor + Sentry replay.
    #   style-src:    'unsafe-inline' for Vue 3 / Tailwind runtime style injection.
