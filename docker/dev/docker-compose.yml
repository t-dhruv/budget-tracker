services:
  backend:
    build:
      context: ../../
      dockerfile: docker/dev/backend/Dockerfile
      args:
        OFFLINE_MODE: ${DOCKER_OFFLINE_MODE:-false}
    volumes:
      - ../../packages/backend:/app/packages/backend
      - ../../packages/shared:/app/packages/shared
      # Mount SSL certificates for HTTPS
      - ../../docker/dev/certs:/app/docker/dev/certs:ro
    ports: ['${APPLICATION_PORT}:${APPLICATION_PORT}']
    depends_on: ['db', 'redis', 'currency-rates-api']
    env_file:
      - ../../.env.development
      # Per-worktree overrides generated by scripts/docker-dev.sh
      - path: ../../.env.development.local
        required: false
    environment:
      - OFFLINE_MODE=${DOCKER_OFFLINE_MODE:-false}

  frontend:
    build:
      context: ../../
      dockerfile: docker/dev/frontend/Dockerfile
      args:
        OFFLINE_MODE: ${DOCKER_OFFLINE_MODE:-false}
    volumes:
      - ../../packages/frontend:/app/packages/frontend
      - ../../packages/shared:/app/packages/shared
      # Mount SSL certificates for HTTPS
      - ../../docker/dev/certs:/app/docker/dev/certs:ro
    ports: ['${PORT}:${PORT}']
    depends_on: ['backend']
    env_file:
      - ../../.env.development
      # Per-worktree overrides generated by scripts/docker-dev.sh
      - path: ../../.env.development.local
        required: false

  db:
    image: postgres:16
    restart: always
    volumes: ['db_data:/var/lib/postgresql/data']
    environment:
      - POSTGRES_USER=${APPLICATION_DB_USERNAME}
      - POSTGRES_PASSWORD=${APPLICATION_DB_PASSWORD}
      - POSTGRES_DB=${APPLICATION_DB_DATABASE}
    # Containers always talk to db:5432; the MAP_* var only controls the host-side port
    ports: ['${MAP_DB_PORT_TO_OS_PORT:-${APPLICATION_DB_PORT}}:5432']

  redis:
    image: redis:7
    volumes: ['redis_data:/data']
    ports: ['${MAP_REDIS_PORT_TO_OS_PORT:-6379}:6379']

  redis-commander:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:${APPLICATION_REDIS_HOST:-redis}:6379
      - PORT=${REDIS_COMMANDER_PORT}
    ports: ['${MAP_REDIS_COMMANDER_PORT_TO_OS_PORT}:${REDIS_COMMANDER_PORT}']
    depends_on: ['redis']
    attach: false

  # Currency Rates API: Custom exchange rate service (primary provider)
  # Uses ECB + NBU data sources for comprehensive currency coverage
  # Supports: 38 currencies with historical data from 1999-01-04
  # API: http://currency-rates-api:8080/{date} or http://currency-rates-api:8080/latest
  currency-rates-api:
    image: letehaha/currency-rates-api:latest
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - '${MAP_CURRENCY_RATES_PORT_TO_OS_PORT:-8102}:8080'
    volumes:
      - currency_rates_data:/app/data
    attach: false
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3

  pgadmin:
    image: dpage/pgadmin4:8.11
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
      - PGADMIN_LISTEN_PORT=${PGADMIN_LISTEN_PORT}
    ports: ['${MAP_PGADMIN_PORT_TO_OS_PORT:-24682}:${PGADMIN_LISTEN_PORT:-24682}']
    depends_on: ['db']
    attach: false

volumes:
  db_data:
  redis_data:
  currency_rates_data:
